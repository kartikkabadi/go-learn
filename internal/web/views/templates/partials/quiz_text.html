{{define "quiz_text_partial"}}
{{if .Question.Answer}}
  <p><code>{{.Question.Answer.PickedLabel}}</code></p>
  <div class="{{if .Question.Answer.Correct}}result ok{{else}}result no{{end}}">{{if .Question.Answer.Correct}}Correct.{{else}}Not quite — answer is: {{.Question.CorrectKey}}{{end}}</div>
  {{if .Ephemeral}}<p class="muted"><a href="/login?next=/lessons/{{.LessonID}}">Log in</a> to save this answer.</p>{{end}}
{{else}}
  <form class="quiz-answer-form" hx-post="/lessons/{{.LessonID}}/questions/{{.Question.ID}}/answer"
        hx-target="#quiz-body-{{.Question.ID}}" hx-swap="innerHTML"
        hx-indicator="#quiz-spinner-{{.Question.ID}}"
        hx-disabled-elt="find button">
    <input type="text" name="pickedKey" placeholder="type your answer" required>
    <button class="btn" type="submit">Check</button>
  </form>
{{end}}
{{end}}

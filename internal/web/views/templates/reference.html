{{define "reference.html"}}
{{template "page_start" .}}
<h1>Reference</h1>
<h2>Glossary</h2>
<dl class="space-y-4">
{{range .Terms}}
  <dt class="font-medium"><strong>{{.Term}}</strong></dt>
  <dd class="muted mb-4 ml-0">{{.Definition}}</dd>
{{end}}
</dl>
<h2>External resources</h2>
<div class="table-wrap">
<table class="data">
  <thead><tr><th>Title</th><th>Notes</th><th>Lesson</th></tr></thead>
  <tbody>
  {{range .References}}
    <tr>
      <td><a href="{{.URL}}">{{.Title}}</a></td>
      <td>{{.Notes}}</td>
      <td>{{if .LessonID}}{{.LessonID}}{{else}}—{{end}}</td>
    </tr>
  {{end}}
  </tbody>
</table>
</div>
{{template "page_end" .}}
{{end}}
